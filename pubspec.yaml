name: shorthand_sanitizer
description: >-
  Type-resolved codemod that rewrites Type.member to Dart dot-shorthand
  .member when the rewrite provably resolves to the same element. Ships the dotsan CLI.
version: 0.2.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/shorthand_sanitizer
issue_tracker: https://github.com/esenmx/shorthand_sanitizer/issues
documentation: https://pub.dev/documentation/shorthand_sanitizer/latest/

topics:
  - codemod
  - cli
  - analyzer
  - refactoring
  - shorthand

environment:
  sdk: ^3.10.0

executables:
  dotsan:

dependencies:
  analyzer: ^14.0.0
  glob: ^2.1.3
  path: ^1.9.1

dev_dependencies:
  test: ^1.31.2
  very_good_analysis: ^10.2.0
